services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: wargear
      POSTGRES_PASSWORD: wargear1234
      POSTGRES_DB: wargeardb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=wargeardb;Username=wargear;Password=wargear1234
      - Jwt__Key=W4rg34rTr4ck3r$3cr3tK3y!2025#S3cur3
      - Jwt__Issuer=wargear-tracker
      - Jwt__Audience=wargear-tracker
    depends_on:
      - db

volumes:
  postgres_data: